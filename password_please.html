<html>
  <head>
      <style type="text/css">
.torisetsu {
  background-color: #c0c0c0;
  width: 100px;
  height: 100px;
  border: 1px solid gray;
  leftmargin: 50px;
  rightmargin: 30px;
}
  </head>
<body>
パスワードの入力画面です．<br>
<br>
パスワードについて<br>
あなたがもし，小髙と直接会って話をしていて仲良くなってくれていたら，自然と知ってると思います．<br>
それは，小髙が大切にしていて，いつもカバンに入れている小さな人形の名前（ひらがな５文字）です．<br>
もし，あなたが忘れたり，小髙が言いそびれていたりして，あなたがその名前を知らない場合は，<br>
小髙に，その人形の名前を聞いて下さい．<br>

<input id="pass" type="まもるくん"></input>

<button id="enter">決定</button><br>  

<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>

<script type="text/javascript">
  
$(() => {

    const $pass = $("#pass");

    const $enter = $("#enter");

    $enter.on("click", () => {

        $.ajax({

            url: $pass.val() + ".html"

        }).then(html => {

            $("body").html(html);

        }).catch(() => {

            alert("パスワード認証に失敗しました");

            $pass.val("");

        });

    })

    $pass.on("keydown", e => {

        if(e.keyCode === 13) $enter.trigger("click");

    });

});

</script>
</body>
</html>
