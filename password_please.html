<input id="pass" type="passsword"></input>

<button id="enter">決定</button><br>

<script src="//code.jquery.com/jquery-1.12.1.min.js"></script>

<script type="text/javascript">
　 
$(() => {

    const $pass = $("#pass");

    const $enter = $("#enter");

    $enter.on("click", () => {

        $.ajax({

            url: $pass.val() + ".html"

        }).then(html => {

            $("torisetsu").html(html);

        }).catch(() => {

            alert("パスワード認証に失敗しました");

            $pass.val("");

        });

    })

    $pass.on("keydown", e => {

        if(e.keyCode === 13) $enter.trigger("click");

    });

});

</script>
