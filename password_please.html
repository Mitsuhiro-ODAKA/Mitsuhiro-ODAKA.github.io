パスワードを入力して下さい．<br>

<input id="pass" type="torisetsu"></input>

<button id="enter">決定</button><br>  

<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>

<script type="text/javascript">
  
$(() => {

    const $pass = $("#pass");

    const $enter = $("#enter");

    $enter.on("click", () => {

        $.ajax({

            url: $pass.val() + ".html"

        }).then(html => {

            $("body").html(html);

        }).catch(() => {

            alert("パスワード認証に失敗しました");

            $pass.val("");

        });

    })

    $pass.on("keydown", e => {

        if(e.keyCode === 13) $enter.trigger("click");

    });

});

</script>
