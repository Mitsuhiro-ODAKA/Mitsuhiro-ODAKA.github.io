<body>

  <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js">
        function Language_setting() {
            if (document.getElementById("pass").value == "まもるくん") {
              $('content').load('まもるくん.html', function(data){
                document.getElementById("content").innerHTML = data;
            } else {
            alert("パスワード認証に失敗しました");
            }
        };
  </script>
<style type="text/css">
    .torisetsu {
    background-color: #c0c0c0;
    leftmargin: 50px;
    rightmargin: 50px;
}
</style>

  
<div class="torisetsu", align="left", font style="font-family:Yu Gothic Medium"></div>
パスワードの入力画面です．<br>
<br>
パスワードについて<br>
あなたがもし，小髙と直接会って話をしていて仲良くなってくれていたら，自然と知っていると思います．<br>
それは，小髙が大切にしていて，いつもカバンに入れている小さな人形の名前（ひらがな５文字）です．<br>
もし，あなたが忘れたり，小髙が言いそびれていたりして，あなたがその名前を知らない場合は，<br>
小髙に，その人形の名前を聞いて下さい．<br>
<input id="pass" value="" type="text"></input>
<button id="enter" onClick="Language_setting()">決定</button><br>
<div id="content" value=""></div>
</body>



</html>
