      .img-container--absolute-position {

          button{
          background:#daa520;
          color:#fff;
          border:none;
          position:relative;
          height:60px;
          font-size:1em;
          padding:0 1.4em;
          cursor:pointer;
          transition:800ms ease all;
          outline:none;
        }
        button:hover{
          background:#000000;
          color:#daa520;
        }
        button:before,button:after{
          content:'';
          position:absolute;
          top:0;
          right:0;
          height:2px;
          width:0;
          background: #daa520;
          transition:400ms ease all;
        }
        button:after{
          right:inherit;
          top:inherit;
          left:0;
          bottom:0;
        }
        button:hover:before,button:hover:after{
          width:100%;
          transition:800ms ease all;
        }

    <script>
        var datalist = {
            "language": "en",
            "others": "others"
        };
        //localStorage.setItem("datalist", JSON.stringify(datalist));
        function Language_setting() {
            if (datalist.language == "en") {
                document.getElementById("lang").innerHTML = "日本語"; 
                document.getElementById("02").hidden = true; 
                document.getElementById("03").hidden = false; 
                document.getElementById("01").innerHTML = document.getElementById("03").innerHTML;
                datalist.language = "jp";
                localStorage.setItem("datalist", JSON.stringify(datalist));
            } else if (datalist.language == "jp") {
                document.getElementById("lang").innerHTML = "English";
                document.getElementById("03").hidden = true;  
                document.getElementById("02").hidden = false; 
                document.getElementById("01").innerHTML = document.getElementById("02").innerHTML;
                datalist.language = "en";
                localStorage.setItem("datalist", JSON.stringify(datalist));
            } else {
                document.getElementById("lang").innerHTML = '';
            }
        };
    </script>
