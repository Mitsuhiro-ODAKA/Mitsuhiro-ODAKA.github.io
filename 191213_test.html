        <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
        <script type="text/javascript" src="https://code.highcharts.com/6/highcharts.js"></script>
        <script type="text/javascript" src="https://code.highcharts.com/6/highcharts-more.js"></script>

    <body style="margin:0;padding:0">
                <div id="container" style="width:300px;height:200px;">Loading....</div>


    <script>
        $(function(){





            Highcharts.setOptions({"global": {}, "lang": {}});
            var option = {"chart": {"renderTo": "container", "width": 300, "height": 200}, "colors": {}, "credits": {"enabled": false}, "drilldown": {}, "exporting": {}, "labels": {}, "legend": {}, "loading": {}, "navigation": {}, "pane": {}, "plotOptions": {}, "series": {}, "subtitle": {"text": "\u30b5\u30d6\u30bf\u30a4\u30c8\u30eb"}, "title": {"text": "\u30e1\u30a4\u30f3\u30bf\u30a4\u30c8\u30eb"}, "tooltip": {}, "xAxis": {"title": {"text": "X\u8ef8"}}, "yAxis": {"title": {"text": "Y\u8ef8"}, "lineWidth": 2}};


 

            var chart = new Highcharts.Chart(option);

            var data = [{"data": [1, 2, 3], "type": "line", "name": "Series 1"}];
            var dataLen = data.length;
            for (var ix = 0; ix < dataLen; ix++) {
                chart.addSeries(data[ix]);
            }
 







        
    });
        </script>
