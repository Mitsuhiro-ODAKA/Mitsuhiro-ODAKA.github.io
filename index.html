          button{
          background:#daa520;
          color:#fff;
          border:none;
          position:relative;
          height:60px;
          font-size:1em;
          padding:0 1.4em;
          cursor:pointer;
          transition:800ms ease all;
          outline:none;
        }
        button:hover{
          background:#000000;
          color:#daa520;
        }
        button:before,button:after{
          content:'';
          position:absolute;
          top:0;
          right:0;
          height:2px;
          width:0;
          background: #daa520;
          transition:400ms ease all;
        }
        button:after{
          right:inherit;
          top:inherit;
          left:0;
          bottom:0;
        }
        button:hover:before,button:hover:after{
          width:100%;
          transition:800ms ease all;
        }

    <script>
        var datalist = {
            "language": "jp",
            "others": "others"
        };
        //localStorage.setItem("datalist", JSON.stringify(datalist));
        function Language_setting() {
            if (datalist.language == "en") {
                document.getElementById("lang").innerHTML = "日本語";
                document.getElementById("01").innerHTML = "Last Updated by Mitsuhiro Odaka on May 4, 2021.";
//                 document.getElementById("02").innerHTML = "Contact";
                datalist.language = "jp"
                localStorage.setItem("datalist", JSON.stringify(datalist));
            } else if (datalist.language == "jp") {
                document.getElementById("lang").innerHTML = "English";
                document.getElementById("01").innerHTML = "最終更新日：2021/05/04";
//                 document.getElementById("02").innerHTML = "連絡（個人携帯）";
                datalist.language = "en";
                localStorage.setItem("datalist", JSON.stringify(datalist));
            } else {
                document.getElementById("lang").innerHTML = '';
            }
        };
    </script>
